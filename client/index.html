<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Messenger</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 30px auto; }
        .row { display: flex; gap: 8px; margin-bottom: 10px; }
        input { flex: 1; padding: 6px; }
        button { padding: 6px 12px; }
        .messages { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 8px; }
        .status { color: gray; font-size: 14px; }
    </style>
</head>
<body>
    <div id="app">
        <h2>Security Messenger</h2>
        <p class="status">Status: {{ status }}</p>

        <div v-if="!loggedIn">
            <div class="row">
                <input v-model="username" placeholder="Login">
                <input v-model="password" type="password" placeholder="Password">
            </div>
            <div class="row">
                <button @click="login">Log In</button>
                <button @click="register">Sign in</button>
            </div>
        </div>

        <div v-else>
            <div class="messages">
                <div v-for="(msg, i) in messages" :key="i">{{ msg }}</div>
            </div>
            <div class="row">
                <input v-model="draft" placeholder="message..." @keyup.enter="sendChat">
                <button @click="sendChat">Надіслати</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
